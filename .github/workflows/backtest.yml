name: Unified Backtest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # opcional: ejecuta cada día a medianoche UTC

jobs:
  backtest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bot: [sol_1m, sol_3m, sol_5m, scanner_top20]  # los 4 bots
        exchange: [binance, kucoin]                   # permite backtest en ambos exchanges
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests matplotlib

      - name: Run Backtest
        run: |
          mkdir -p reports/${{ matrix.bot }}
          if [[ "${{ matrix.bot }}" == "scanner_top20" ]]; then
            python backtest.py --exchange ${{ matrix.exchange }} --days 7 --initial_capital 1000
          else
            timeframe=$(echo ${{ matrix.bot }} | cut -d'_' -f2 | sed 's/m//')
            python backtest.py --exchange ${{ matrix.exchange }} --timeframe $timeframe --days 7 --initial_capital 1000
          fi

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: backtest-reports-${{ matrix.bot }}-${{ matrix.exchange }}
          path: reports/${{ matrix.bot }}/
