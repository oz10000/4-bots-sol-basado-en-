name: Unified Trading Workflow

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución (backtest/sim/live)'
        required: true
        default: backtest

jobs:
  sol_1min:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: |
          if [ "${{ github.event.inputs.mode }}" = "backtest" ]; then
            python backtest.py --exchange binance --symbol SOLUSDT --timeframe 1 --days 7 --initial_capital 1000
          else
            python modulo_estrategia_sol.py  # sim/live según lógica interna
          fi
      - uses: actions/upload-artifact@v3
        with:
          name: reports-sol_1min
          path: reports/

  sol_3min:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
